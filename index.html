<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaf & Loom</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f766e,#14b8a6);
    color:white;
}

/* HEADER */
header{
    text-align:center;
    padding:20px;
    background:rgba(0,0,0,0.3);
}

nav a{
    color:white;
    margin:10px;
    text-decoration:none;
    font-weight:bold;
}

/* SECTIONS */
section{
    padding:30px;
}

h2{
    text-align:center;
}

/* GALLERY */
.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.gallery img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:12px;
}

/* VIDEO */
.video{
    display:flex;
    justify-content:center;
}

video{
    width:80%;
    max-width:600px;
    border-radius:12px;
}

/* SHOP */
.shop{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.card{
    background:white;
    color:black;
    width:180px;
    border-radius:10px;
    overflow:hidden;
    text-align:center;
}

.card img{
    width:100%;
    height:130px;
    object-fit:cover;
}

/* TABLE */
table{
    width:90%;
    margin:auto;
    border-collapse:collapse;
    background:rgba(255,255,255,0.15);
}

th,td{
    padding:10px;
    border:1px solid rgba(255,255,255,0.3);
    text-align:center;
}

/* CONTACT */
form{
    width:80%;
    max-width:400px;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

input, textarea{
    padding:10px;
    border:none;
    border-radius:8px;
}

/* FOOTER */
footer{
    text-align:center;
    padding:15px;
    background:rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<header>
<h1>🌿 Leaf & Loom</h1>

<nav>
<a href="#gallery">Gallery</a>
<a href="#video">Video</a>
<a href="#shop">Shop</a>
<a href="#prices">Prices</a>
<a href="#contact">Contact</a>
</nav>
</header>

<!-- HERO -->
<section>
<h2>Indoor Plant Shop 🌱</h2>
<p style="text-align:center;">Fresh plants for your home</p>
</section>

<!-- GALLERY -->
<section id="gallery">
<h2>Gallery</h2>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07">
<img src="https://images.unsplash.com/photo-1459411552884-841db9b3cc2a">
<img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">
<img src="https://images.unsplash.com/photo-1524594227084-6c4b1c3b9c3f">
<img src="https://images.unsplash.com/photo-1509423350716-97f2360af0b5">
</div>
</section>

<!-- VIDEO -->
<section id="video">
<h2>Video</h2>

<div class="video">
<video controls>
<source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4">
</video>
</div>
</section>

<!-- SHOP -->
<section id="shop">
<h2>Shop</h2>

<div class="shop">

<div class="card">
<img src="https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07">
<p>Monstera</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1459411552884-841db9b3cc2a">
<p>Snake Plant</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">
<p>Peace Lily</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1524594227084-6c4b1c3b9c3f">
<p>Pothos</p>
</div>

</div>
</section>

<!-- PRICES -->
<section id="prices">
<h2>Price Table</h2>

<table>
<tr><th>Plant</th><th>Price (Ksh)</th></tr>
<tr><td>Monstera</td><td>1200</td></tr>
<tr><td>Snake Plant</td><td>800</td></tr>
<tr><td>Peace Lily</td><td>1000</td></tr>
<tr><td>Pothos</td><td>700</td></tr>
</table>
</section>

<!-- CONTACT -->
<section id="contact">
<h2>Contact Us</h2>

<form>
<input type="text" placeholder="Your Name">
<input type="email" placeholder="Your Email">
<textarea rows="4" placeholder="Your Message"></textarea>
<button type="submit">Send</button>
</form>

</section>

<footer>
<p>© 2026 Leaf & Loom</p>
</footer>

</body>
</html>
