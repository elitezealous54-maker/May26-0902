<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaf & Loom</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f766e,#14b8a6);
    color:white;
}

header{
    text-align:center;
    padding:20px;
    background:rgba(0,0,0,0.3);
}

nav a{
    color:white;
    margin:10px;
    text-decoration:none;
    font-weight:bold;
}

.hero{
    text-align:center;
    padding:30px;
}

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    padding:20px;
}

.gallery img{
    width:200px;
    height:200px;
    object-fit:cover;
    border-radius:12px;
}

.video{
    display:flex;
    justify-content:center;
    padding:20px;
}

video{
    width:80%;
    max-width:600px;
    border-radius:12px;
}

table{
    width:90%;
    margin:auto;
    border-collapse:collapse;
    background:rgba(255,255,255,0.15);
}

th,td{
    padding:10px;
    text-align:center;
    border:1px solid rgba(255,255,255,0.3);
}

</style>
</head>

<body>

<header>
<h1>🌿 Leaf & Loom</h1>
<nav>
<a href="#gallery">Gallery</a>
<a href="#video">Video</a>
<a href="#prices">Prices</a>
</nav>
</header>

<div class="hero">
<h2>Indoor Plant Shop</h2>
<p>Fresh plants for your space 🌱</p>
</div>

<!-- GALLERY (WORKING IMAGES) -->
<section id="gallery">
<h2 style="text-align:center;">Gallery</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07">
<img src="https://images.unsplash.com/photo-1459411552884-841db9b3cc2a">
<img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">
<img src="https://images.unsplash.com/photo-1524594227084-6c4b1c3b9c3f">
<img src="https://images.unsplash.com/photo-1509423350716-97f2360af0b5">

</div>
</section>

<!-- VIDEO (WORKING ONLINE VIDEO) -->
<section id="video">
<h2 style="text-align:center;">Plant Video</h2>

<div class="video">
<video controls>
<source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
</video>
</div>

</section>

<!-- PRICE TABLE -->
<section id="prices">
<h2 style="text-align:center;">Price Table</h2>

<table>
<tr><th>Plant</th><th>Price (Ksh)</th></tr>
<tr><td>Monstera</td><td>1200</td></tr>
<tr><td>Snake Plant</td><td>800</td></tr>
<tr><td>Peace Lily</td><td>1000</td></tr>
<tr><td>Pothos</td><td>700</td></tr>
<tr><td>Areca Palm</td><td>1500</td></tr>
</table>

</section>

</body>
</html>
